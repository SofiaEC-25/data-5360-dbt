version: 2

models:
  - name: oliver_dim_customer
    description: "Oliver’s sweets and drinks Customer Dimension"
  - name: oliver_dim_employee
    description: "Oliver’s sweets and drinks Employee Dimension"
  - name: oliver_dim_date
    description: "Oliver’s sweets and drinks Date Dimension"
  - name: oliver_dim_product
    description: "Oliver’s sweets and drinks Product Dimension"
    columns:
      - name: product_key
        tests:
          - unique
  - name: oliver_dim_store
    description: "Oliver’s sweets and drinks Store Dimension"
    columns:
      - name: store_name
        tests:
          - accepted_values:
              values:
                - "North Skagway"
                - "East Gilbert"
                - "Franks Corner"
  - name: fact_sales
    description: "Oliver’s sweets and drinks Sales Fact"
    columns:
      - name: store_key
        tests:
          - not_null
  - name: stg_employee_certifications
    description: 
      Staging model for employee certifications. Each record contains an employee and information on the certification
      they have recieved.
  - name: fact_certification
    description: 
      A fact table recording individual certification achievements by employees. 
      The grain of this fact is one row per employee per certification per date awarded.
    columns:
      - name: employee_key
        tests:
          - relationships:
              to: ref('oliver_dim_employee')
              field: employee_key
      